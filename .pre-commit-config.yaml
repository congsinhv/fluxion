# Fluxion pre-commit hooks — enforces docs/code-standards.md locally.
# Install: `pre-commit install && pre-commit install --hook-type commit-msg`
# Run ad-hoc: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^(fluxion-backend|fluxion-oem-processor)/.*\.py$
      - id: ruff-format
        files: ^(fluxion-backend|fluxion-oem-processor)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^fluxion-frontend/.*\.(ts|tsx|js|jsx|json|md|css|html)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.15.0
    hooks:
      - id: eslint
        files: ^fluxion-frontend/src/.*\.(ts|tsx)$
        additional_dependencies:
          - eslint@9.15.0
          - "@typescript-eslint/eslint-plugin@8.0.0"
          - "@typescript-eslint/parser@8.0.0"

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt

  - repo: local
    hooks:
      - id: commitlint
        name: commitlint (enforce [#N]: subject)
        language: system
        stages: [commit-msg]
        entry: npx --no -- commitlint --edit
