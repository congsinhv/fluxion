# Alembic configuration for fluxion-backend.
# Migration versions live in migrations/versions/.
# Run migrations: alembic -c migrations/alembic.ini upgrade head

[alembic]
# script_location points to the migrations/ directory containing env.py.
script_location = migrations

# DATABASE_URI is injected by env.py from the environment — not hardcoded here.
# See migrations/env.py and docs/code-standards.md §2.6 (no secrets in config).
sqlalchemy.url =

# Migration file naming: NNNN_snake_case.py (see code-standards.md §2.1).
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
