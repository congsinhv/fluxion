name: Docker Build & Push to ECR
description: Login to ECR, buildx-build, tag with SHA + latest, push.

inputs:
  repository:
    description: ECR repository name (no registry prefix).
    required: true
  context:
    description: Docker build context path.
    required: true
  dockerfile:
    description: Path to the Dockerfile.
    required: true
  tag:
    description: Primary image tag (usually github.sha).
    required: true

runs:
  using: composite
  steps:
    - name: Login to ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          ${{ steps.ecr.outputs.registry }}/${{ inputs.repository }}:${{ inputs.tag }}
          ${{ steps.ecr.outputs.registry }}/${{ inputs.repository }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # AWS Lambda only accepts Docker image manifest v2 schema 2; it rejects
        # OCI image indexes that buildx adds via provenance/SBOM attestations.
        # Disabling these keeps the manifest format Lambda-compatible.
        provenance: false
        sbom: false
