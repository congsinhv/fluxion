name: AWS OIDC Login
description: Assume the Fluxion deploy role via GitHub OIDC and verify identity.

inputs:
  role-arn:
    description: ARN of the IAM role to assume (AWS_DEPLOY_ROLE_ARN).
    required: true
  region:
    description: AWS region.
    required: false
    default: ap-southeast-1

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.region }}

    - name: Verify caller identity
      shell: bash
      run: aws sts get-caller-identity
